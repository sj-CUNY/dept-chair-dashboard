<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dept Chair Dashboard — Starting Up</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f0f4f8;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      color: #1a202c;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 40px 48px;
      width: 480px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      text-align: center;
    }

    .logo {
      font-size: 36px;
      margin-bottom: 16px;
    }

    h1 {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 6px;
    }

    .subtitle {
      font-size: 13px;
      color: #718096;
      margin-bottom: 32px;
    }

    /* Progress bar */
    .progress-wrap {
      background: #e2e8f0;
      border-radius: 8px;
      height: 10px;
      overflow: hidden;
      margin-bottom: 14px;
    }
    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #3182ce, #63b3ed);
      border-radius: 8px;
      width: 0%;
      transition: width 0.3s ease;
    }

    .status {
      font-size: 13px;
      color: #4a5568;
      min-height: 20px;
      margin-bottom: 24px;
    }

    .steps {
      list-style: none;
      text-align: left;
      font-size: 13px;
      color: #718096;
    }
    .steps li {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 0;
      border-bottom: 1px solid #edf2f7;
    }
    .steps li:last-child { border-bottom: none; }
    .step-icon { font-size: 16px; width: 20px; text-align: center; }
    .step-done  .step-icon::before { content: "✅"; }
    .step-active .step-icon::before { content: "⏳"; }
    .step-wait   .step-icon::before { content: "⬜"; }
    .step-done  { color: #38a169; }
    .step-active { color: #3182ce; font-weight: 500; }

    /* Error state */
    .error-box {
      display: none;
      background: #fff5f5;
      border: 1px solid #fc8181;
      border-radius: 8px;
      padding: 16px;
      text-align: left;
      font-size: 13px;
      color: #c53030;
      white-space: pre-wrap;
      word-break: break-word;
      margin-top: 16px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">📋</div>
    <h1>Dept Chair Dashboard</h1>
    <p class="subtitle">Department Chair Dashboard</p>

    <div class="progress-wrap">
      <div class="progress-bar" id="progressBar"></div>
    </div>
    <p class="status" id="statusMsg">Starting up…</p>

    <ul class="steps" id="stepList">
      <li id="step-libreoffice" class="step-wait">
        <span class="step-icon"></span>
        <span>Check LibreOffice (DOCX → PDF support)</span>
      </li>
      <li id="step-server" class="step-wait">
        <span class="step-icon"></span>
        <span>Start dashboard server</span>
      </li>
      <li id="step-open" class="step-wait">
        <span class="step-icon"></span>
        <span>Open dashboard in browser</span>
      </li>
    </ul>

    <div class="error-box" id="errorBox"></div>
  </div>

  <script>
    const bar    = document.getElementById('progressBar');
    const status = document.getElementById('statusMsg');
    const errBox = document.getElementById('errorBox');

    function setStep(id, state) {
      const el = document.getElementById(id);
      if (!el) return;
      el.className = `step-${state}`;
    }

    function setProgress(pct, msg) {
      bar.style.width = pct + '%';
      if (msg) status.textContent = msg;
    }

    window.setup.onProgress(({ step, pct, msg }) => {
      if (step === 'libreoffice-check')  { setStep('step-libreoffice', 'active'); setProgress(5,  msg || 'Checking LibreOffice…'); }
      if (step === 'libreoffice-ok')     { setStep('step-libreoffice', 'done');   setProgress(20, msg || 'LibreOffice ready'); }
      if (step === 'libreoffice-dl')     { setStep('step-libreoffice', 'active'); setProgress(pct != null ? 5 + pct * 0.5 : 30, msg || `Downloading LibreOffice… ${pct ?? ''}%`); }
      if (step === 'libreoffice-inst')   { setStep('step-libreoffice', 'active'); setProgress(60, msg || 'Installing LibreOffice…'); }
      if (step === 'libreoffice-done')   { setStep('step-libreoffice', 'done');   setProgress(65, msg || 'LibreOffice installed'); }
      if (step === 'server-start')       { setStep('step-server',      'active'); setProgress(70, msg || 'Starting server…'); }
      if (step === 'server-ready')       { setStep('step-server',      'done');   setProgress(90, msg || 'Server ready'); }
      if (step === 'opening')            { setStep('step-open',        'active'); setProgress(95, msg || 'Opening dashboard…'); }
      if (step === 'done')               { setStep('step-open',        'done');   setProgress(100, msg || 'Done!'); }
    });

    window.setup.onError((msg) => {
      status.textContent = 'Startup failed';
      bar.style.background = '#fc8181';
      errBox.style.display = 'block';
      errBox.textContent   = msg;
    });

    window.setup.onDone(() => {
      // Window will be hidden by main process
    });
  </script>
</body>
</html>
