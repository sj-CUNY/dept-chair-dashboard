name: Build Desktop Installers

# Trigger: push a version tag like v1.0.0
# Or run manually from the Actions tab (workflow_dispatch)
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:

  # ── macOS Apple Silicon (arm64) ─────────────────────────────────────────────
  build-mac-arm64:
    name: macOS (Apple Silicon)
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-node@v4.4.0
        with:
          node-version: '20'

      - name: Install Node dependencies
        working-directory: desktop
        run: npm ci

      - name: Bundle Python (arm64)
        working-directory: desktop
        run: node scripts/bundle-python.js

      - name: Build DMG (arm64)
        working-directory: desktop
        env:
          CSC_LINK: ${{ secrets.APPLE_CERT_P12 }}
          CSC_KEY_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
          CSC_NAME: Developer ID Application
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npx electron-builder --mac --arm64

      - name: Attach to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: desktop/dist/*.dmg

  # ── Windows x64 ─────────────────────────────────────────────────────────────
  build-windows:
    name: Windows (x64)
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-node@v4.4.0
        with:
          node-version: '20'

      - uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.11'

      - name: Install Node dependencies
        working-directory: desktop
        run: npm ci

      - name: Bundle Python (x64)
        working-directory: desktop
        run: node scripts/bundle-python.js

      - name: Build Windows installer
        working-directory: desktop
        run: npx electron-builder --win

      - name: Attach to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: desktop/dist/*.exe
